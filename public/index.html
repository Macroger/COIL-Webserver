<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control Dashboard</title>
    <link rel="stylesheet" href="/get_style/dashboard.css">
    <link rel="stylesheet" href="/get_style/themes.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <div class="theme-picker-wrap">
                    <span class="theme-label">Theme</span>
                    <select id="themePicker" class="theme-picker-select" title="Select theme">
                        <option value="default">Default</option>
                        <option value="angelic">Angelic</option>
                        <option value="demonic">Demonic</option>
                        <option value="industrial">Industrial</option>
                        <option value="cyberpunk">Cyberpunk</option>
                    </select>
                </div>
            </div>

            <div class="header-center">
                <h1>Robot Control Dashboard</h1>
            </div>

            <div class="header-right">
                <div class="connection-status">
                    <span id="statusIndicator" class="status-dot connected"></span>
                    <span id="statusText">Connected</span>
                    <button id="btnSettings" class="btn-settings" title="Settings & Connection">⚙️</button>
                    <button id="btnTelemetry" class="btn-telemetry" title="Telemetry">📡</button>
                    <button id="btnConsole" class="btn-console" title="Raw Message Console">💬</button>
                </div>
            </div>
        </header>

        <!-- Settings Panel (Collapsible) -->
        <div id="settingsPanel" class="settings-panel hidden">
            <div class="settings-content">
                <h3>Connection Settings</h3>
                <div class="settings-group">
                    <div class="input-group">
                        <label for="robotIP">Robot IP Address:</label>
                        <input type="text" id="robotIP" value="localhost" placeholder="IP address">
                    </div>
                    <div class="input-group">
                        <label for="robotPort">Port:</label>
                        <input type="number" id="robotPort" value="5000" min="1" max="65535">
                    </div>
                    <div class="input-group">
                        <label for="socketType">Socket Type:</label>
                        <select id="socketType">
                            <option value="0">TCP</option>
                            <option value="1">UDP</option>
                        </select>
                    </div>
                </div>
                <div class="settings-buttons">
                    <button id="btnConnect" class="btn-connect">Connect</button>
                    <button id="btnDisconnect" class="btn-disconnect">Disconnect</button>
                    <button id="btnReconnect" class="btn-reconnect">Reconnect</button>
                </div>
                <div class="settings-status">
                    <p>Status: <span id="connectionStatus">Initializing...</span></p>
                    <p>Mode: <span id="connectionMode">--</span></p>
                </div>
            </div>
        </div>

        <!-- Telemetry Status Bar Pop-down (hidden by default) -->
        <div id="telemetryPanel" class="settings-panel hidden">
            <div class="settings-content">
                <div class="telemetry-header" style="display:flex;justify-content:space-between;align-items:center">
                    <h3 style="margin:0">Telemetry Status</h3>
                    <div>
                        <button id="btnStatus" class="btn-status">Request Status</button>
                    </div>
                </div>
                <div class="status-bar" id="statusBar">
                    <p class="log-empty">No telemetry data received yet.</p>
                </div>
            </div>
        </div>

        <!-- Comm Console Pop-down (hidden by default) -->
        <div id="consolePanel" class="settings-panel hidden">
            <div class="settings-content">
                <div class="telemetry-header" style="display:flex;justify-content:space-between;align-items:center">
                    <h3 style="margin:0">Raw Message Console</h3>
                    <div>
                        <button id="btnClearConsole" class="btn-clear-console">Clear</button>
                        <label class="console-auto-scroll" style="margin-left:8px"><input type="checkbox" id="autoScroll" checked> Auto-scroll</label>
                    </div>
                </div>
                <div id="commConsole" class="comm-console" aria-live="polite"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="dashboard-content">
            <!-- Control Panel (Left) -->
            <div class="control-panel">
                <h2>Control Panel</h2>
                
                <div class="directional-controls">
                    <h3>Movement</h3>
                    <div class="arrow-pad">
                        <button id="btnForward" class="arrow-btn arrow-up" title="Move Forward">↑</button>
                        <div class="arrow-row">
                            <button id="btnLeft" class="arrow-btn arrow-left" title="Turn Left">←</button>
                            <span class="arrow-center">Control</span>
                            <button id="btnRight" class="arrow-btn arrow-right" title="Turn Right">→</button>
                        </div>
                        <button id="btnBackward" class="arrow-btn arrow-down" title="Move Backward">↓</button>
                    </div>
                </div>

                <div class="numeric-inputs">
                    <h3>Parameters</h3>
                    <div class="input-group">
                        <label for="duration">Duration (s):</label>
                        <input type="range" id="duration" value="2" min="1" max="10" step="1">
                        <span id="durationDisplay">2s</span>
                    </div>
                    <div class="input-group">
                        <label for="power">Power:</label>
                        <input type="range" id="power" value="80" min="80" max="100" step="1">
                        <span id="powerDisplay">80%</span>
                    </div>
                </div>
                
                <div class="processing-area">
                    <div id="processingMessage" class="processing-message hidden" aria-live="polite"></div>
                </div>

                
            </div>

            <!-- History & Status Panel (Right) -->
            <div class="history-panel">
                <h2>Status & History</h2>
                
                <div class="history-section">
                    <h3>Command History</h3>
                    <div id="commandLog" class="command-log">
                        <p class="log-empty">No commands executed yet</p>
                    </div>
                    <div class="settings-buttons">
                        <button id="btnExportHistory" class="btn-export-history">Export JSON</button>
                        <button id="btnClearHistory" class="btn-clear-history">Clear History</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/get_script/command-history.js"></script>
    <script src="/get_script/theme-switcher.js"></script>
    <script src="/get_script/robot-control.js"></script>
    <script src="/get_script/connection-config.js"></script>
</body>
</html>
